name: sav_ds_example
description: "Gallery / playground app demonstrating the sav_ds design system."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # The design system under development, consumed via a local path dependency.
  sav_ds:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans.ttf
        - asset: assets/fonts/DMSans-Italic.ttf
          style: italic
    - family: Obviously
      fonts:
        - asset: assets/fonts/ObviouslyNarrow-Semibold.otf
