name: sav_ds
description: "Sav Design System — a vendored, dependency-free Flutter component library and design-token set."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true

  # Design assets shipped with the package. Consumers reference them via the
  # `packages/sav_ds/` prefix (see lib/core/noise.dart for the image, and the
  # example app's pubspec for the fonts).
  assets:
    - assets/images/

  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans.ttf
        - asset: assets/fonts/DMSans-Italic.ttf
          style: italic
    - family: Obviously
      fonts:
        - asset: assets/fonts/ObviouslyNarrow-Semibold.otf
